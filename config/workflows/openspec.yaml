id: openspec
name: OpenSpec Flow
columns:
  - id: backlog
    label: Backlog
    description: Ideas and requests waiting to be explored

  - id: explore
    label: Explore
    description: Think through the problem, investigate options, clarify requirements
    on_enter_prompt: |
      /opsx-explore
      use "which" in the shell to find other cli tools and use the full path to execute them.
    stage_instructions: Do not exit exploration mode without my call

  - id: propose
    label: Propose
    description: Create a change proposal with design, specs, and tasks
    on_enter_prompt: /opsx-propose
    stage_instructions: Do not exit propose mode without my call

  - id: apply
    label: Apply
    description: Implement the tasks from the change proposal
    on_enter_prompt: |
      /opsx-apply
      In the end:
        1 - build the app and execute tests
        2 - Optimize the implementation
        3 - Remove any dead code
        4 - Execute the tests
        5 - Go back to step 2 one time

  - id: done
    label: Done
    description: Change implemented and archived
    on_enter_prompt: |
      commit our changes using conventional commits with a meaninful message (8 words max).
      squash all the diff from main to a single consise conventional commit message.
      rebase from main.
      solve possible conflicts. Read the recent archived changes in openspec folder to know what to do.
      Use ask_me tool if the conflicts resolution is not clear.
      /opsx-archive with sync.
      merge to main.
      Remove the task worktree.
      push main branch.

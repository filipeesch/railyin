name: new-tool
description: >
  Explore+plan scenario: implement a new "count_lines" tool in Railyin's tool system.
  The model explores how existing tools are defined, registered, and executed,
  then implements the new tool end-to-end. Tests understanding of the tool
  architecture across tools.ts, handlers, and workflow config.

codebase: railyin

prompt: |
  Add a new tool called "count_lines" to Railyin's tool system.

  First, use search_text and find_files to locate:
  - Where tool schemas are defined (look for existing tools like read_file or search_text)
  - Where tool handlers are implemented
  - Where tools are registered into tool groups

  Then write the implementation using write_file or edit_file:
  1. Add the count_lines handler (input: file_path string, output: line count integer or error string)
  2. Register it in the appropriate tool group so it appears when "read" or "search" tools are loaded

  Do not stop after exploring. You must write the actual code files before finishing.

expected_behavior:
  max_rounds: 12
  must_complete: true
  must_call:
    - edit_file

column_tools:
  - read
  - write
  - search

assertions:
  - type: cost_under
    value: 2.00
